<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organization Helper</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <h1>📦 Organization <span class="highlight">Helper</span></h1>
        <nav>
          <ul>
            <li><a href="#home">Início</a></li>
            <li><a href="#products">Meus Itens</a></li>
            <li><a href="#demo-form" class="btn-primary">Novo Item</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section id="home" class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <h2>
            Organize sua vida com o<br />
            <span class="glow-text">Organization Helper</span>
          </h2>
          <p>Gerencie estoque, coleções e itens pessoais com facilidade.</p>
        </div>
      </section>

      <section id="demo-form" class="form-section">
        <div class="container reveal">
          <h2>📝 Adicionar Novo Item</h2>
          <form
            id="product-form"
            class="product-form"
            action="cadastrar.php"
            method="POST"
          >
            <div class="form-group">
              <label for="product-name">Nome do Item</label>
              <input
                type="text"
                id="product-name"
                name="product-name"
                placeholder="Ex: Notebook..."
                required
              />
            </div>
            <div class="form-group">
              <label for="product-description">Descrição</label>
              <textarea
                id="product-description"
                name="product-description"
                rows="3"
              ></textarea>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label for="product-price">Valor (R$)</label>
                <input
                  type="number"
                  id="product-price"
                  name="product-price"
                  step="0.01"
                  min="0"
                  required
                />
              </div>
              <div class="form-group">
                <label for="product-quantity">Quantidade</label>
                <input
                  type="number"
                  id="product-quantity"
                  name="product-quantity"
                  min="1"
                  value="1"
                  required
                />
              </div>
              <div class="form-group">
                <label for="product-category">Categoria</label>
                <select id="product-category" name="product-category" required>
                  <option value="eletronicos">Eletrônicos</option>
                  <option value="livros">Livros</option>
                  <option value="roupas">Roupas</option>
                  <option value="casa">Casa / Organização</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label for="product-image">Foto (URL)</label>
              <input type="url" id="product-image" name="product-image" />
            </div>
            <button type="submit" class="btn-primary full-width">
              Salvar no Inventário
            </button>
          </form>
        </div>
      </section>

      <section id="products" class="products-section">
        <div class="container reveal">
          <h2>📦 Itens Cadastrados</h2>
          <div class="filters">
            <input
              type="text"
              id="search"
              placeholder="🔍 Buscar..."
              class="search-input"
            />
            <select id="category-filter" class="filter-select">
              <option value="">Todas as categorias</option>
              <option value="eletronicos">Eletrônicos</option>
              <option value="livros">Livros</option>
              <option value="roupas">Roupas</option>
              <option value="casa">Casa e Decoração</option>
            </select>
          </div>
          <div class="products-grid" id="products-grid">
            <div style="text-align: center; color: #ffd700">Carregando...</div>
          </div>
        </div>
      </section>
    </main>

    <div id="edit-modal" class="modal-overlay">
      <div class="modal-content product-form">
        <span class="close-modal" onclick="closeEditModal()">&times;</span>
        <h2>✏️ Editar Item</h2>
        <form id="edit-form">
          <input type="hidden" id="edit-id" name="edit-id" />
          <div class="form-group">
            <label>Nome do Item</label>
            <input type="text" id="edit-name" name="edit-name" required />
          </div>
          <div class="form-group">
            <label>Descrição</label>
            <textarea
              id="edit-description"
              name="edit-description"
              rows="3"
            ></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Valor (R$)</label>
              <input
                type="number"
                id="edit-price"
                name="edit-price"
                step="0.01"
                required
              />
            </div>
            <div class="form-group">
              <label>Qtd</label>
              <input
                type="number"
                id="edit-quantity"
                name="edit-quantity"
                min="1"
                required
              />
            </div>
            <div class="form-group">
              <label>Categoria</label>
              <select id="edit-category" name="edit-category" required>
                <option value="eletronicos">Eletrônicos</option>
                <option value="livros">Livros</option>
                <option value="roupas">Roupas</option>
                <option value="casa">Casa / Organização</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>URL da Imagem</label>
            <input type="url" id="edit-image" name="edit-image" />
          </div>
          <button
            type="submit"
            class="btn-primary full-width"
            style="background-color: #007bff; color: white"
          >
            Salvar Alterações
          </button>
        </form>
      </div>
    </div>

    <footer>
      <div class="container">
        <p>&copy; 2024 <strong>Organization Helper</strong></p>
      </div>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
